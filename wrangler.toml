name = "landlogistik"
main = "worker.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
CONTACT_FROM = "kontakt@landlogistik.at"
CONTACT_TO = "office@landlogistik.at"
# RESEND_API_KEY → wrangler secret put RESEND_API_KEY
# TURNSTILE_SECRET → wrangler secret put TURNSTILE_SECRET  (set to "disabled" for local dev)
# TURNSTILE_SITE_KEY → set in CF dashboard Build variables
